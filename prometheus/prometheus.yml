global:
  scrape_interval:     15s   # How often to scrape targets
  evaluation_interval: 15s   # How often to evaluate rules
  scrape_timeout:      10s

# ── Alerting (optional, wired up for future use) ────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# ── Scrape configurations ────────────────────────────────────────────────────
scrape_configs:

  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Our CSV sales exporter
  - job_name: "csv_sales_exporter"
    scrape_interval: 15s
    static_configs:
      - targets: ["csv-exporter:8000"]
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "csv-exporter"
